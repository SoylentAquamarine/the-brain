name: Hourly Provider Health Check

# Pings every AI provider once per hour with a simple question.
# Logs latency + quality to stats/health_log.json.
# Generates latency and uptime graphs → assets/health_graph.png
# Updates the README health section automatically.

on:
  schedule:
    - cron: '0 * * * *'   # top of every hour, 24/7

  # Run manually from the Actions tab at any time
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt matplotlib

      - name: Run health check
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          MISTRAL_API_KEY:     ${{ secrets.MISTRAL_API_KEY }}
          CEREBRAS_API_KEY:    ${{ secrets.CEREBRAS_API_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          SAMBANOVA_API_KEY:   ${{ secrets.SAMBANOVA_API_KEY }}
          FIREWORKS_API_KEY:   ${{ secrets.FIREWORKS_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
        run: python health_check.py

      - name: Generate graphs and update README
        run: python generate_health_graph.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats/health_log.json assets/health_graph.png assets/health_uptime.png README.md
          git diff --cached --quiet || git commit -m "chore: hourly health check $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
