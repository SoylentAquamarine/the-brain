name: Nightly Stats Update

# Runs every night at midnight UTC.
# Reads stats/usage.json, rebuilds the README stats block,
# and commits + pushes the result back to the repo.
# View the run history at: Actions tab on GitHub.

on:
  schedule:
    - cron: '0 0 * * *'   # midnight UTC every day

  # Also allows manual trigger from the Actions tab on GitHub.
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to push the updated README back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so the commit shows up cleanly in git log.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv pyyaml

      - name: Update README with latest stats
        run: python update_readme_stats.py
        # Note: no --push flag here — the next step handles the git push
        # so we get a cleaner commit author (github-actions bot).

      - name: Commit and push if README changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md stats/usage.json
          # Only commit if something actually changed.
          git diff --cached --quiet || git commit -m "chore: nightly stats update $(date -u '+%Y-%m-%d')

          Auto-generated by nightly-stats.yml GitHub Actions workflow.
          Shows cumulative AI provider usage and Claude token savings."
          git push
